<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Today">
  <meta name="theme-color" content="#1E0D02">
  <link rel="manifest" href="manifest.json">
  <title>Today</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ログイン画面 -->
  <div id="login-screen" class="screen active">
    <div class="login-box">
      <div class="login-title">TODAY</div>
      <button id="login-btn" class="google-btn">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google でログイン
      </button>
    </div>
  </div>

  <!-- メイン画面 -->
  <div id="app-screen" class="screen">

    <!-- 左ペイン：時計 + 天気 -->
    <div class="left-pane">

      <!-- パタパタ時計 -->
      <div class="flip-clock">
        <!-- 時 -->
        <div class="flip-unit" id="fu-h1">
          <div class="fu-top"><span>0</span></div>
          <div class="fu-bot"><span>0</span></div>
          <div class="fu-ft"><span>0</span></div>
          <div class="fu-fb"><span>0</span></div>
        </div>
        <div class="flip-unit" id="fu-h2">
          <div class="fu-top"><span>0</span></div>
          <div class="fu-bot"><span>0</span></div>
          <div class="fu-ft"><span>0</span></div>
          <div class="fu-fb"><span>0</span></div>
        </div>
        <div class="flip-sep">:</div>
        <!-- 分 -->
        <div class="flip-unit" id="fu-m1">
          <div class="fu-top"><span>0</span></div>
          <div class="fu-bot"><span>0</span></div>
          <div class="fu-ft"><span>0</span></div>
          <div class="fu-fb"><span>0</span></div>
        </div>
        <div class="flip-unit" id="fu-m2">
          <div class="fu-top"><span>0</span></div>
          <div class="fu-bot"><span>0</span></div>
          <div class="fu-ft"><span>0</span></div>
          <div class="fu-fb"><span>0</span></div>
        </div>
      </div>

      <!-- 日付 -->
      <div class="clock-date" id="clock-date"></div>

      <!-- 天気 -->
      <div class="weather-box">
        <div class="weather-row">
          <span id="w-icon">&#127774;</span>
          <span class="weather-temp" id="w-temp">--&deg;</span>
        </div>
        <div class="weather-detail">
          <span id="w-humid">湿度 --%</span>
          <span id="w-loc"></span>
        </div>
      </div>

      <!-- ログアウト -->
      <button id="logout-btn" class="logout-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>

    <!-- 仕切り -->
    <div class="divider"></div>

    <!-- 右ペイン：カレンダー -->
    <div class="right-pane">
      <div class="cal-date-label" id="cal-date-label"></div>
      <div id="cal-loading" class="state-view"><div class="spinner"></div></div>
      <div id="cal-error"   class="state-view hidden"><p id="cal-error-msg"></p><button class="retry-btn" onclick="loadCalendar()">再試行</button></div>
      <div id="cal-empty"   class="state-view hidden"><p class="empty-text">今日の予定はありません</p></div>
      <div id="cal-list"    class="event-list hidden"></div>
    </div>

  </div>

  <script src="https://accounts.google.com/gsi/client" async></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/clock.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
