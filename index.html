<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="My Dashboard">
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>My Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ログイン画面 -->
  <div id="login-screen" class="screen active">
    <div class="login-container">
      <div class="app-logo">
        <div class="logo-icon">
          <span class="logo-cal">📅</span>
          <span class="logo-chat">💬</span>
        </div>
      </div>
      <h1 class="app-title">My Dashboard</h1>
      <p class="app-subtitle">カレンダーとチャットをまとめて確認</p>
      <button id="login-btn" class="google-btn">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Googleでログイン
      </button>
      <p class="login-note">※ Google Cloud ConsoleでClient IDを設定してください</p>
    </div>
  </div>

  <!-- メインアプリ画面 -->
  <div id="app-screen" class="screen">
    <!-- ヘッダー -->
    <header class="app-header">
      <div class="header-left">
        <h1 id="header-title">カレンダー</h1>
        <p id="header-subtitle">今日の予定</p>
      </div>
      <div class="header-right">
        <div id="user-avatar" class="user-avatar"></div>
        <button id="logout-btn" class="icon-btn" title="ログアウト">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- コンテンツエリア -->
    <main class="app-content">

      <!-- カレンダータブ -->
      <div id="calendar-tab" class="tab-content active">
        <div id="calendar-loading" class="loading-container">
          <div class="spinner"></div>
          <p>カレンダーを読み込み中...</p>
        </div>
        <div id="calendar-error" class="error-container hidden">
          <span class="error-icon">⚠️</span>
          <p id="calendar-error-msg"></p>
          <button class="retry-btn" onclick="loadCalendar()">再試行</button>
        </div>
        <div id="calendar-empty" class="empty-container hidden">
          <span class="empty-icon">📭</span>
          <p>今後7日間の予定はありません</p>
        </div>
        <div id="calendar-list" class="hidden"></div>
      </div>

      <!-- チャットタブ -->
      <div id="chat-tab" class="tab-content">
        <!-- スペース一覧 -->
        <div id="spaces-view">
          <div id="chat-loading" class="loading-container">
            <div class="spinner"></div>
            <p>チャットを読み込み中...</p>
          </div>
          <div id="chat-error" class="error-container hidden">
            <span class="error-icon">⚠️</span>
            <p id="chat-error-msg"></p>
            <button class="retry-btn" onclick="loadSpaces()">再試行</button>
          </div>
          <div id="chat-empty" class="empty-container hidden">
            <span class="empty-icon">💬</span>
            <p>Google Chatのスペースがありません</p>
          </div>
          <div id="spaces-list" class="hidden"></div>
        </div>

        <!-- メッセージ一覧 -->
        <div id="messages-view" class="hidden">
          <div class="messages-header">
            <button id="back-btn" class="back-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="15 18 9 12 15 6"/>
              </svg>
            </button>
            <div class="space-info">
              <h2 id="space-name"></h2>
              <p id="space-type"></p>
            </div>
          </div>
          <div id="messages-loading" class="loading-container hidden">
            <div class="spinner"></div>
            <p>メッセージを読み込み中...</p>
          </div>
          <div id="messages-list"></div>
        </div>
      </div>

    </main>

    <!-- タブバー -->
    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="calendar">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span class="tab-label">カレンダー</span>
      </button>
      <button class="tab-btn" data-tab="chat">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span class="tab-label">チャット</span>
        <span id="chat-badge" class="badge hidden">0</span>
      </button>
    </nav>
  </div>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
